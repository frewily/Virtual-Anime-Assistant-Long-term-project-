<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; connect-src 'self' ws://localhost:* http://localhost:* https://*.deepseek.com https://api.deepseek.com; media-src 'self' blob:; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Anime Assistant</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <div id="app">
        <div class="drag-handle" id="drag-handle"></div>
        <div class="resize-handle resize-n"></div>
        <div class="resize-handle resize-s"></div>
        <div class="resize-handle resize-w"></div>
        <div class="resize-handle resize-e"></div>
        <div class="resize-handle resize-nw"></div>
        <div class="resize-handle resize-ne"></div>
        <div class="resize-handle resize-sw"></div>
        <div class="resize-handle resize-se"></div>
        <canvas id="live2d-canvas"></canvas>
        <div class="loading">正在召唤角色...</div>
        <div class="status-bar">
            <div class="status-dot disconnected" id="ws-dot" title="WebSocket状态"></div>
            <div class="settings-btn" id="settings-btn" title="设置">⚙</div>
        </div>
        <div class="settings-panel" id="settings-panel">
            <div class="settings-header">设置</div>
            <label class="settings-label">角色大小</label>
            <div class="settings-scale-row">
                <input type="range" class="settings-slider" id="scale-slider" min="50" max="120" value="100" step="5">
                <span class="settings-value" id="scale-value">100%</span>
            </div>
            <label class="settings-label">语音音色</label>
            <select class="settings-select" id="voice-select">
                <option value="zh-CN-XiaoxiaoNeural">晓晓 (女)</option>
                <option value="zh-CN-XiaoyiNeural">晓伊 (女)</option>
                <option value="zh-CN-YunxiNeural">云希 (男)</option>
                <option value="zh-CN-YunjianNeural">云健 (男)</option>
                <option value="zh-CN-XiaochenNeural">晓辰 (女)</option>
            </select>
            <button class="settings-close-btn" id="settings-close-btn">关闭</button>
        </div>
        <div class="chat-panel" id="chat-panel">
            <div class="chat-history" id="chat-history"></div>
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chat-input" placeholder="和主人说点什么吧..." autocomplete="off">
                <button class="chat-send-btn" id="chat-send-btn" title="发送">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="../../assets/live2dcubismcore4.min.js"></script>
    <script>
        window.addEventListener('error', (e) => {
            console.error('[Global Error]', e.message, '\nStack:', e.error ? e.error.stack : '(no stack)');
        });
        require('./js/live2d.js').initCanvas();
        const live2d = require('./js/live2d.js');
        const { addToHistory } = require('./js/chat');
        const wsClient = require('./js/websocket.js');
        wsClient.connect();

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send-btn');

        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            addToHistory('user', text);
            wsClient.send({ type: 'chat', content: text });
            chatInput.value = '';
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        chatInput.addEventListener('focus', () => {
            document.getElementById('chat-panel').classList.add('focused');
        });
        chatInput.addEventListener('blur', () => {
            document.getElementById('chat-panel').classList.remove('focused');
        });

        const settingsPanel = document.getElementById('settings-panel');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleValue = document.getElementById('scale-value');
        const voiceSelect = document.getElementById('voice-select');

        settingsBtn.addEventListener('click', () => {
            const open = settingsPanel.classList.toggle('open');
            settingsBtn.textContent = open ? '✕' : '⚙';
        });
        settingsCloseBtn.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
            settingsBtn.textContent = '⚙';
        });

        const savedScale = localStorage.getItem('assistant_scale');
        if (savedScale) {
            scaleSlider.value = savedScale;
            scaleValue.textContent = savedScale + '%';
            setTimeout(() => live2d.setScaleMultiplier(parseInt(savedScale) / 100), 2000);
        }

        const savedVoice = localStorage.getItem('assistant_voice');
        if (savedVoice) {
            voiceSelect.value = savedVoice;
        }

        scaleSlider.addEventListener('input', () => {
            const val = scaleSlider.value;
            scaleValue.textContent = val + '%';
            localStorage.setItem('assistant_scale', val);
            live2d.setScaleMultiplier(parseInt(val) / 100);
        });

        voiceSelect.addEventListener('change', () => {
            localStorage.setItem('assistant_voice', voiceSelect.value);
            wsClient.send({ type: 'settings', voice: voiceSelect.value });
        });
    </script>
</body>

</html>
