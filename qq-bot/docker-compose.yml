services:
  napcat:
    image: ghcr.io/napneko/napcatappimagebuild:latest
    container_name: qq-bot-napcat
    restart: unless-stopped
    ports:
      - "6099:6099"
      - "3001:3001"
    volumes:
      - ./data/QQ:/app/.config/QQ
      - ./data/napcat:/app/napcat/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
