# 二次元桌面助手 - Spring Boot 配置
# 
# 配置说明：
# - server: 服务器配置
# - spring: Spring Boot 核心配置
# - assistant: 项目自定义配置
#
# 实现阶段：Phase 1 (MVP)
# 后续阶段会添加更多配置项

server:
  # 服务端口
  port: 8080

spring:
  application:
    # 应用名称
    name: desktop-assistant
  
  # JSON 序列化配置
  jackson:
    # 日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区
    time-zone: Asia/Shanghai
    # 忽略 null 值
    default-property-inclusion: non_null

# 项目自定义配置
assistant:
  # 音频分发配置
  audio:
    distribution:
      # QQ 分发配置
      qq:
        enabled: true
        # 是否发送语音消息（需要 silk 转换）
        voice-message: false
        # 是否发送文字消息
        text-message: true
      # 桌面分发配置
      desktop:
        enabled: true
        # 是否播放语音
        voice: true
        # 是否触发 Live2D 动作
        motion: true

  # GPT-SoVITS 语音合成服务配置
  # 实现阶段：Phase 3
  gpt-sovits:
    # API 地址
    api-url: http://localhost:9880
    # 超时时间（毫秒）
    timeout: 30000

  # EdgeTTS 备用语音服务配置
  # 实现阶段：Phase 3
  edgetts:
    # API 地址
    api-url: https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1
    # 默认声线
    default-voice: zh-CN-XiaoxiaoNeural

  # QQ 机器人配置
  # 实现阶段：Phase 6
  qq-bot:
    # OneBot API 地址
    api-url: http://localhost:3000
    # 监听的群号列表
    group-ids:
      - 123456789
    # 管理员 QQ 号
    admin-qq: 12345678

# 日志配置
logging:
  level:
    root: info
    com.assistant: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 开发环境配置
# 生产环境请使用 application-prod.yml
---
spring:
  config:
    activate:
      on-profile: dev

# 开发环境：启用详细日志
logging:
  level:
    com.assistant: debug
    org.springframework.web: debug

---
spring:
  config:
    activate:
      on-profile: prod

# 生产环境：减少日志
logging:
  level:
    root: warn
    com.assistant: info
