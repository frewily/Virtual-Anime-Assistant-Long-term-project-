<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 二次元桌面助手 - 管理面板</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text2: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d2991d;
            --red: #f85149;
            --purple: #bc8cff;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar h1 {
            font-size: 16px;
            padding: 0 20px 20px;
            color: var(--accent);
            white-space: nowrap;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text2);
            text-decoration: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all .2s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            color: var(--text);
            background: var(--bg3);
            border-left-color: var(--accent);
        }

        .sidebar nav a .icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card h3 {
            font-size: 13px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 12px;
        }

        .card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .card .value.green {
            color: var(--green);
        }

        .card .value.orange {
            color: var(--orange);
        }

        .card .value.red {
            color: var(--red);
        }

        .card .value.purple {
            color: var(--purple);
        }

        .card .sub {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
        }

        .bar-bg {
            background: var(--bg3);
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .5s ease;
        }

        .bar-fill.green {
            background: var(--green);
        }

        .bar-fill.orange {
            background: var(--orange);
        }

        .bar-fill.red {
            background: var(--red);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 10px 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text2);
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.green {
            background: rgba(63, 185, 80, .15);
            color: var(--green);
        }

        .badge.red {
            background: rgba(248, 81, 73, .15);
            color: var(--red);
        }

        .badge.orange {
            background: rgba(210, 153, 29, .15);
            color: var(--orange);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            transition: all .2s;
        }

        .btn:hover {
            background: var(--border);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn.primary:hover {
            background: #4090e0;
        }

        .btn.danger {
            border-color: var(--red);
            color: var(--red);
        }

        .btn.danger:hover {
            background: rgba(248, 81, 73, .1);
        }

        .btn.small {
            padding: 4px 10px;
            font-size: 12px;
        }

        textarea,
        input,
        select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        textarea:focus,
        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .flex {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mt-12 {
            margin-top: 12px;
        }

        .mb-12 {
            margin-bottom: 12px;
        }

        .audio-player {
            width: 100%;
            margin-top: 8px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online {
            background: var(--green);
            box-shadow: 0 0 6px rgba(63, 185, 80, .5);
        }

        .status-dot.offline {
            background: var(--red);
            box-shadow: 0 0 6px rgba(248, 81, 73, .5);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            z-index: 100;
            animation: slideIn .3s ease;
        }

        .toast.success {
            background: var(--green);
            color: #fff;
        }

        .toast.error {
            background: var(--red);
            color: #fff;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .refresh-hint {
            font-size: 12px;
            color: var(--text2);
        }

        @media (max-width:768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 12px;
                overflow-x: auto;
            }

            .sidebar h1 {
                padding: 0 12px 0 0;
                font-size: 14px;
            }

            .sidebar nav {
                display: flex;
                gap: 4px;
            }

            .sidebar nav a {
                padding: 8px 12px;
                font-size: 12px;
                border-left: none;
                border-bottom: 2px solid transparent;
            }

            .sidebar nav a.active {
                border-left: none;
                border-bottom-color: var(--accent);
            }

            .main {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <h1>✨ 桌面助手</h1>
        <nav>
            <a href="#dashboard" class="active" data-page="dashboard"><span class="icon">📊</span>仪表盘</a>
            <a href="#system" data-page="system"><span class="icon">🖥</span>系统监控</a>
            <a href="#activity" data-page="activity"><span class="icon">📋</span>活动记录</a>
            <a href="#tts" data-page="tts"><span class="icon">🎙</span>语音测试</a>
            <a href="#qq" data-page="qq"><span class="icon">💬</span>QQ 机器人</a>
            <a href="#scenarios" data-page="scenarios"><span class="icon">🎭</span>场景管理</a>
        </nav>
    </aside>

    <main class="main" id="main-content"></main>

    <script>
        const BASE = 'http://localhost:8080/api';

        let currentPage = 'dashboard';

        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const page = link.dataset.page;
                navigateTo(page);
            });
        });

        function navigateTo(page) {
            currentPage = page;
            document.querySelectorAll('[data-page]').forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            renderPage(page);
        }

        function renderPage(page) {
            const main = document.getElementById('main-content');
            switch (page) {
                case 'dashboard': renderDashboard(main); break;
                case 'system': renderSystem(main); break;
                case 'activity': renderActivity(main); break;
                case 'tts': renderTTS(main); break;
                case 'qq': renderQQ(main); break;
                case 'scenarios': renderScenarios(main); break;
            }
            if (page === 'dashboard' || page === 'system') startAutoRefresh(page);
            else stopAutoRefresh();
        }

        let refreshTimer = null;
        function startAutoRefresh(page) {
            stopAutoRefresh();
            refreshTimer = setInterval(() => {
                if (currentPage === page) renderPage(page);
            }, 3000);
        }
        function stopAutoRefresh() {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        }

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        async function fetchAPI(path) {
            try {
                const res = await fetch(BASE + path);
                if (!res.ok) throw new Error(res.status);
                return await res.json();
            } catch (e) { return null; }
        }

        async function postAPI(path, body) {
            try {
                const res = await fetch(BASE + path, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                });
                return await res.json();
            } catch (e) { return null; }
        }

        function formatTime(ms) {
            if (!ms) return '-';
            const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
            return h + 'h ' + m + 'm';
        }

        function cpuColor(val) { return val > 80 ? 'red' : val > 50 ? 'orange' : 'green'; }
        function memColor(val) { return val > 90 ? 'red' : val > 65 ? 'orange' : 'green'; }

        function getAppIcon(appId) {
            const icons = {
                'trae': '🛸', 'vs_code': '🖥', 'visual_studio_code': '🖥', 'intellij_idea': '🧠', 'idea': '🧠',
                'chrome': '🌐', 'google_chrome': '🌐', 'firefox': '🦊', 'edge': '🌊',
                'terminal': '💻', 'iterm2': '💻', 'cmd': '⚡', 'powershell': '⚡',
                'wechat': '💬', 'weixin': '💬', 'qq': '🐧', 'telegram': '✈️',
                'steam': '🎮', 'genshin_impact': '🎭', 'minecraft': '⛏',
                'spotify': '🎵', 'netflix': '🎬', 'youtube': '📺',
                'finder': '📁', 'explorer': '📁', 'word': '📄', 'excel': '📊',
                'photoshop': '🎨', 'figma': '🖌'
            };
            return icons[appId] || '📱';
        }

        async function renderDashboard(main) {
            const [status, activity, qqStatus, avatarStatus] = await Promise.all([
                fetchAPI('/status'), fetchAPI('/report/activity/current'),
                fetchAPI('/qq/status'), fetchAPI('/avatar/status')
            ]);
            const cpu = status ? parseFloat(status.cpuUsage) : 0;
            const mem = status ? parseFloat(status.memoryUsage) : 0;

            main.innerHTML = `
        <h2>📊 仪表盘</h2>
        <div class="grid">
            <div class="card">
                <h3>CPU 使用率</h3>
                <div class="value ${cpuColor(cpu)}">${status?.cpuUsage || '--'}</div>
                <div class="bar-bg"><div class="bar-fill ${cpuColor(cpu)}" style="width:${cpu}%"></div></div>
                <div class="sub">${status ? '进程数: ' + (status.processCount || '-') : '获取中...'}</div>
            </div>
            <div class="card">
                <h3>内存使用率</h3>
                <div class="value ${memColor(mem)}">${status?.memoryUsage || '--'}</div>
                <div class="bar-bg"><div class="bar-fill ${memColor(mem)}" style="width:${mem}%"></div></div>
                <div class="sub">${status ? '运行: ' + formatTime(status.uptime) : '获取中...'}</div>
            </div>
            <div class="card">
                <h3>🎯 当前活动窗口</h3>
                ${activity ? `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
                    <span style="font-size:28px">${getAppIcon(activity.appId)}</span>
                    <div>
                        <div class="value purple" style="font-size:20px;line-height:1.3">${activity.appName || activity.appId}</div>
                        <span class="badge purple" style="margin-top:4px">${activity.appId || '未知应用'}</span>
                    </div>
                </div>
                <div class="sub" style="background:var(--bg3);padding:8px 10px;border-radius:4px;word-break:break-all;font-family:monospace;font-size:12px;max-height:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${activity.windowTitle}">
                    📝 ${activity.windowTitle}
                </div>
                <div class="sub mt-12" style="font-size:11px;color:var(--text2)">
                    🕐 ${activity.timestamp ? new Date(activity.timestamp).toLocaleString('zh-CN') : '-'}
                </div>
                ` : `
                <div style="text-align:center;padding:20px 0;color:var(--text2)">
                    <div style="font-size:36px;margin-bottom:8px">🪟</div>
                    <div>等待窗口上报...</div>
                    <div class="sub mt-12">请启动 Python Agent 以获取活动窗口</div>
                </div>
                `}
            </div>
            <div class="card">
                <h3>连接状态</h3>
                <div class="flex" style="margin-bottom:8px">
                    <span class="badge ${avatarStatus && avatarStatus.connectedClients > 0 ? 'green' : 'red'}">
                        Live2D: ${avatarStatus?.connectedClients || 0} 客户端
                    </span>
                    <span class="badge ${qqStatus?.connected ? 'green' : 'red'}">
                        QQ: ${qqStatus?.connected ? '已连接' : '未连接'}
                    </span>
                </div>
                <div class="sub">WebSocket: /ws/avatar + /ws/qq</div>
            </div>
        </div>
        <div class="flex">
            <button class="btn primary" onclick="navigateTo('tts')">🎙 语音测试</button>
            <button class="btn" onclick="navigateTo('scenarios')">🎭 场景管理</button>
            <button class="btn" onclick="renderPage('dashboard');toast('已刷新')">🔄 刷新</button>
        </div>
    `;
        }

        function renderSystem(main) {
            fetchAPI('/status').then(status => {
                if (!status) { main.innerHTML = '<h2>🖥 系统监控</h2><p style="color:var(--red)">无法获取系统状态</p>'; return; }
                const cpu = parseFloat(status.cpuUsage);
                const mem = parseFloat(status.memoryUsage);
                main.innerHTML = `
            <h2>🖥 系统监控 <span class="refresh-hint">自动刷新 3s</span></h2>
            <div class="grid">
                <div class="card">
                    <h3>CPU 使用率</h3>
                    <div class="value ${cpuColor(cpu)}">${status.cpuUsage}</div>
                    <div class="bar-bg"><div class="bar-fill ${cpuColor(cpu)}" style="width:${cpu}%"></div></div>
                </div>
                <div class="card">
                    <h3>内存使用率</h3>
                    <div class="value ${memColor(mem)}">${status.memoryUsage}</div>
                    <div class="bar-bg"><div class="bar-fill ${memColor(mem)}" style="width:${mem}%"></div></div>
                </div>
                <div class="card">
                    <h3>系统信息</h3>
                    <div class="sub">运行时间: ${formatTime(status.uptime)}</div>
                    <div class="sub">进程数: ${status.processCount || '-'}</div>
                    <div class="sub">操作系统: ${status.osName || '-'}</div>
                </div>
                <div class="card">
                    <h3>Java 进程</h3>
                    <div class="sub">可用处理器: ${status.availableProcessors || '-'}</div>
                    <div class="sub">JVM 内存: ${status.jvmTotalMemory || 0} / ${status.jvmMaxMemory || 0} MB</div>
                    <div class="sub">Java版本: ${status.javaVersion || '-'}</div>
                </div>
            </div>
        `;
            });
        }

        function renderActivity(main) {
            fetchAPI('/report/activity/current').then(activity => {
                main.innerHTML = `
            <h2>📋 活动记录</h2>
            <div class="card mb-12">
                <h3>当前窗口</h3>
                <div style="font-size:18px;font-weight:600;color:var(--purple)">${activity?.appName || activity?.appId || '无'}</div>
                <div class="sub mt-12">窗口标题: ${activity?.windowTitle || '等待 Agent 上报...'}</div>
                <div class="sub">应用ID: ${activity?.appId || '-'}</div>
                <div class="sub">更新时间: ${activity?.timestamp ? new Date(activity.timestamp).toLocaleString('zh-CN') : '-'}</div>
            </div>
            <div class="card">
                <h3>工作原理</h3>
                <div class="sub">Agent 每 5 秒检测一次前台窗口，通过 HTTP POST 上报到后端。</div>
                <div class="sub mt-12">支持的平台: Windows (Win32 API) 和 macOS (AppleScript)</div>
            </div>
            <button class="btn mt-12" onclick="renderPage('activity');toast('已刷新')">🔄 刷新</button>
        `;
            });
        }

        function renderTTS(main) {
            fetchAPI('/tts/voices').then(voices => {
                const voiceOptions = (voices || []).map(v =>
                    `<option value="${v.id}">${v.name} — ${v.description || ''}</option>`
                ).join('');

                main.innerHTML = `
            <h2>🎙 语音合成测试</h2>
            <div class="card mb-12">
                <h3>语音参数</h3>
                <div class="form-group">
                    <label>合成文本</label>
                    <textarea id="tts-text" rows="2" placeholder="输入要合成的文字...">主人，早上好呀~ 今天也要加油哦！</textarea>
                </div>
                <div class="form-group">
                    <label>声线选择 (GPT-SoVITS)</label>
                    <select id="tts-voice">${voiceOptions}</select>
                </div>
                <div class="form-group">
                    <label>备用声线 (EdgeTTS)</label>
                    <select id="tts-fallback">
                        <option value="zh-CN-XiaoxiaoNeural">晓晓 (女，活泼)</option>
                        <option value="zh-CN-XiaoyiNeural">晓伊 (女，可爱)</option>
                        <option value="zh-CN-YunxiNeural">云希 (男，温柔)</option>
                        <option value="zh-CN-YunjianNeural">云健 (男，沉稳)</option>
                    </select>
                </div>
                <button class="btn primary" onclick="testTTS()">🔊 合成并播放</button>
                <div id="tts-result" class="mt-12"></div>
            </div>
            <div class="card">
                <h3>语音引擎降级链</h3>
                <div class="sub">GPT-SoVITS (Windows GPU) → EdgeTTS (Python CLI) → macOS say (内置)</div>
                <div class="sub mt-12">GPT-SoVITS 地址: http://localhost:9880 (可配置)</div>
                <div class="sub">EdgeTTS 需安装: <code>pip install edge-tts</code></div>
            </div>
        `;
            });
        }

        async function testTTS() {
            const text = document.getElementById('tts-text').value;
            const voiceId = document.getElementById('tts-voice').value;
            const fallback = document.getElementById('tts-fallback').value;
            if (!text) { toast('请输入合成文本', 'error'); return; }

            document.getElementById('tts-result').innerHTML = '<span class="badge orange">合成中...</span>';

            const res = await postAPI('/tts/speak', { text, voiceId, fallbackVoice: fallback });
            if (!res || !res.success) {
                document.getElementById('tts-result').innerHTML = `<span class="badge red">合成失败: ${res?.errorMessage || '未知错误'}</span>`;
                return;
            }

            const audioEl = document.createElement('audio');
            audioEl.controls = true;
            audioEl.autoplay = true;
            audioEl.className = 'audio-player';
            audioEl.src = BASE + '/tts/audio/' + res.audioId;
            document.getElementById('tts-result').innerHTML = `
        <span class="badge green">✓ 合成成功 (${res.voiceUsed})</span>
    `;
            document.getElementById('tts-result').appendChild(audioEl);
            toast('语音合成成功!');
        }

        function renderQQ(main) {
            fetchAPI('/qq/status').then(status => {
                main.innerHTML = `
            <h2>💬 QQ 机器人</h2>
            <div class="grid">
                <div class="card">
                    <h3>连接状态</h3>
                    <div style="font-size:18px;font-weight:600">
                        <span class="status-dot ${status?.connected ? 'online' : 'offline'}"></span>
                        ${status?.connected ? '已连接' : '未连接'}
                    </div>
                    <div class="sub mt-12">OneBot API: ${status?.apiUrl || 'http://localhost:3000'}</div>
                </div>
                <div class="card">
                    <h3>连接方式</h3>
                    <div class="sub">反向 WebSocket: ws://localhost:8080/ws/qq</div>
                    <div class="sub">HTTP 上报: POST /api/qq/callback</div>
                </div>
            </div>
            <div class="card mb-12">
                <h3>测试发送</h3>
                <div class="form-group">
                    <label>发送类型</label>
                    <select id="qq-msg-type">
                        <option value="group">群聊消息</option>
                        <option value="private">私聊消息</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="qq-id-label">群号 / QQ号</label>
                    <input id="qq-target-id" placeholder="123456789">
                </div>
                <div class="form-group">
                    <label>消息内容</label>
                    <input id="qq-message" placeholder="你好~ 这是来自助手的消息" value="主人，我好想你呀~">
                </div>
                <button class="btn primary" onclick="testQQSend()">📤 发送测试消息</button>
            </div>
            <div class="card">
                <h3>部署说明</h3>
                <div class="sub">1. Windows 上安装 NapCatQQ</div>
                <div class="sub">2. 配置反向 WebSocket: url = ws://你的macOS_IP:8080/ws/qq</div>
                <div class="sub" style="color:var(--orange)">⚠ 请使用小号测试，避免主号被封</div>
            </div>
        `;
            });
        }

        async function testQQSend() {
            const type = document.getElementById('qq-msg-type').value;
            const targetId = document.getElementById('qq-target-id').value;
            const message = document.getElementById('qq-message').value;
            if (!targetId || !message) { toast('请填写完整信息', 'error'); return; }

            const body = {
                post_type: 'message',
                message_type: type,
                raw_message: message,
                user_id: type === 'private' ? parseInt(targetId) : 12345678,
                group_id: type === 'group' ? parseInt(targetId) : 0
            };
            const res = await postAPI('/qq/callback', body);
            if (res && res.status === 'ok') {
                toast('消息已发送至 MessageRouter');
            } else {
                toast('发送失败', 'error');
            }
        }

        function renderScenarios(main) {
            const scenarios = [
                { id: 'high_cpu', name: 'CPU 过高', trigger: 'cpu_threshold > 80%', desc: '当 CPU 使用率超过 80% 时触发', icon: '🔥' },
                { id: 'gaming', name: '摸鱼检测', trigger: 'app_detect 游戏类应用', desc: '检测到游戏类应用时温馨提醒', icon: '🎮' },
                { id: 'late_night', name: '深夜关怀', trigger: 'time_range 23:00-06:00', desc: '深夜时分提醒主人休息', icon: '🌙' },
                { id: 'focus_mode', name: '专注模式', trigger: 'app_duration IDE 2h+', desc: '编码超过 2 小时后提醒休息', icon: '💻' }
            ];

            main.innerHTML = `
        <h2>🎭 场景管理</h2>
        <div class="grid">${scenarios.map(s => `
            <div class="card">
                <h3>${s.icon} ${s.name}</h3>
                <div class="sub">ID: ${s.id}</div>
                <div class="sub">触发: ${s.trigger}</div>
                <div class="sub mb-12">${s.desc}</div>
                <button class="btn small primary" onclick="triggerScenario('${s.id}')">▶ 手动触发</button>
            </div>
        `).join('')}</div>
        <div class="card">
            <h3>场景机制</h3>
            <div class="sub">• 每 10 秒自动检测场景条件</div>
            <div class="sub">• 同一场景 5 分钟内不重复触发 (冷却)</div>
            <div class="sub">• 支持类型: cpu_threshold | app_detect | time_range | app_duration</div>
            <div class="sub mt-12">配置文件: <code>config/scenarios.yml</code></div>
        </div>
    `;
        }

        async function triggerScenario(scenarioId) {
            const res = await postAPI('/message/trigger', { scenarioId });
            if (res && res.text) {
                toast('场景已触发: ' + res.text);
            } else {
                toast('触发场景失败', 'error');
            }
        }

        renderDashboard(document.getElementById('main-content'));
    </script>

</body>

</html>
